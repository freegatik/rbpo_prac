name: Build

on:
  push:
    branches: [ main, zad-1, zad-2 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-app-${{ matrix.build_type }}
          path: |
            build/${{ matrix.build_type }}/rbpo-app.exe
            build/${{ matrix.build_type }}/rbpo-service.exe
