name: Build

on:
  push:
    branches: [ main, master, zad-1, zad-2, zad-3, zad-4, zad-5 ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]
        arch: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-app-${{ matrix.build_type }}-${{ matrix.arch }}
          path: |
            build/${{ matrix.build_type }}/rbpo-app.exe
            build/${{ matrix.build_type }}/rbpo-service.exe
